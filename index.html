<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paediatric Dose Calculator</title>
    </head>
<body>

    <h1>Dose Calculator</h1>

    <div>
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" placeholder="e.g. 12.5" step="0.1">
    </div>

    <div>
        <label for="drug">Select Antibiotic:</label>
        <select id="drug">
            <option value="amoxicillin_standard">Amoxicillin (Standard 15mg/kg)</option>
            </select>
    </div>

    <button id="calculateBtn">Calculate Dose</button>

    <h2>Result:</h2>
    <p id="resultDisplay">Enter details to see the dose.</p>

    <script src="app.js"></script>
</body>
</html>
